<!DOCTYPE html>
<html>
<head>
  <title>Fieldmax Sales Logger</title>
  <style>
    body { font-family: Arial, sans-serif; background: #f0f4f8; padding: 20px; }
    .container { max-width: 500px; margin: auto; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
    h2 { text-align: center; color: #1976d2; }
    label { margin-top: 10px; display: block; font-weight: bold; }
    input { width: 100%; padding: 8px; margin-top: 5px; border: 1px solid #ccc; border-radius: 5px; }
    button { margin-top: 20px; width: 100%; padding: 10px; background: #1976d2; color: white; border: none; border-radius: 5px; font-weight: bold; }
    .msg { margin-top: 20px; text-align: center; font-weight: bold; }
  </style>
</head>
<body>
  <div class="container">
    <h2>Fieldmax Sales Logger</h2>

    <label>Item Code</label>
    <input type="text" id="code" placeholder="e.g. FSL001" oninput="autoFill()">

    <label>Item Name</label>
    <input type="text" id="name" readonly>

    <label>Buying Price</label>
    <input type="number" id="buying" readonly>

    <label>Selling Price</label>
    <input type="number" id="sale" oninput="calcProfit()">

    <label>Profit</label>
    <input type="number" id="profit" readonly>

    <button onclick="submitForm()">Submit Sale</button>

    <div class="msg" id="msg"></div>
  </div>

  <script>
    const productData = {
      FSL001: { name: "NORMAL PROTECTORS", buying: 20 },
      FSL002: { name: "21D PROTECTORS", buying: 25 },
      FSL003: { name: "MIRROR  PROTECTORS", buying: 100 }
    };

    function autoFill() {
      const code = document.getElementById("code").value.toUpperCase();
      const product = productData[code];
      if (product) {
        document.getElementById("name").value = product.name;
        document.getElementById("buying").value = product.buying;
        calcProfit();
      } else {
        document.getElementById("name").value = "";
        document.getElementById("buying").value = "";
        document.getElementById("profit").value = "";
      }
    }

    function calcProfit() {
      const buy = parseFloat(document.getElementById("buying").value) || 0;
      const sell = parseFloat(document.getElementById("sale").value) || 0;
      document.getElementById("profit").value = sell - buy;
    }

    async function submitForm() {
      const payload = {
        code: document.getElementById("code").value,
        name: document.getElementById("name").value,
        buying: parseFloat(document.getElementById("buying").value),
        sale: parseFloat(document.getElementById("sale").value),
        profit: parseFloat(document.getElementById("profit").value)
      };

      const res = await fetch("/submit-sale", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(payload)
      });

      const result = await res.json();
      document.getElementById("msg").innerText = result.message;
    }
  </script>
</body>
</html>
