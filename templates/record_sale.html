<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Record Sale</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container mt-5">
    <h2 class="mb-4">Record Sale</h2>

    {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
            {% for category, message in messages %}
                <div class="alert alert-{{ category }} alert-dismissible fade show" role="alert">
                    {{ message }}
                    <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                </div>
            {% endfor %}
        {% endif %}
    {% endwith %}

    <form method="POST" action="/record-sale">
        <div class="mb-3">
            <label for="item_code" class="form-label">Item Code</label>
            <input type="text" class="form-control" id="item_code" name="item_code" required>
        </div>

        <div id="product-info" class="mb-3 d-none">
            <p><strong>Item Name:</strong> <span id="item_name"></span></p>
            <p><strong>Default Selling Price:</strong> Ksh <span id="default_price"></span></p>
            <p><strong>Stock Left:</strong> <span id="stock_left"></span></p>
        </div>

        <div class="mb-3">
            <label for="sale_price" class="form-label">Sale Price (Actual)</label>
            <input type="number" class="form-control" id="sale_price" name="sale_price" step="0.01" required>
        </div>

        <div class="mb-3">
            <label for="quantity" class="form-label">Quantity</label>
            <input type="number" class="form-control" id="quantity" name="quantity" min="1" required>
        </div>

        <button type="submit" class="btn btn-success">Record Sale</button>
    </form>
</div>

<script>
    document.getElementById('item_code').addEventListener('blur', function() {
        const code = this.value.trim();
        if (code) {
            fetch(`/get-product/${code}`)
                .then(response => response.json())
                .then(data => {
                    if (data.error) {
                        document.getElementById('product-info').classList.add('d-none');
                    } else {
                        document.getElementById('item_name').textContent = data.item_name;
                        document.getElementById('default_price').textContent = data.selling_price.toFixed(2);
                        document.getElementById('stock_left').textContent = data.in_stock;
                        document.getElementById('product-info').classList.remove('d-none');
                    }
                })
                .catch(error => {
                    document.getElementById('product-info').classList.add('d-none');
                });
        }
    });
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
