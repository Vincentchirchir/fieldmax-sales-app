<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Fieldmax Shop Sales</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script>
        function showForm(formId) {
            document.getElementById("upload-form").style.display = "none";
            document.getElementById("sales-form").style.display = "none";
            document.getElementById(formId).style.display = "block";
        }

        window.onload = function () {
            showForm('dashboard');  // default
        };
    </script>
</head>
<body class="bg-light">
    <div class="container mt-5">
        <h2 class="text-center mb-4">📦 Fieldmax Shop Sales Portal</h2>
        <div class="text-center mb-4">
        <button class="btn btn-primary me-2" onclick="showForm('upload-form')">Upload Product</button>
        <button class="btn btn-success" onclick="showForm('sales-form')">Record Sale</button>
        </div>

        <!-- Upload Product Form -->
        <div id="upload-form" style="display:none;">
            <div class="card p-4 shadow">
                <h5>Upload Product</h5>
                <form method="POST" action="/upload-product">
                    <div class="mb-3">
                        <label>Item Code</label>
                        <input type="text" name="item_code" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label>Item Name</label>
                        <input type="text" name="item_name" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label>Buying Price</label>
                        <input type="number" name="buying_price" step="0.01" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label>Selling Price</label>
                        <input type="number" name="selling_price" step="0.01" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label>Quantity to Add</label>
                        <input type="number" name="added_stock" class="form-control" required>
                    </div>
                    <button type="submit" class="btn btn-primary">Upload</button>
                </form>
            </div>
        </div>

        <!-- Record Sale Form -->
        <!-- Record Sale Form -->
<div id="sales-form" style="display:none;">
    <div class="card p-4 shadow">
        <h5>Record Sale</h5>
        <form method="POST" action="/record-sale">
            <div class="mb-3">
                <label>Item Code</label>
                <input type="text" name="item_code" id="item_code" class="form-control" onblur="fetchProduct()" required>
            </div>
            <div class="mb-3">
                <label>Item Name</label>
                <input type="text" id="item_name" name="item_name" class="form-control" readonly>
            </div>
            <div class="mb-3">
                <label>Buying Price</label>
                <input type="number" id="buying_price" name="buying_price" class="form-control" readonly>
            </div>
            <div class="mb-3">
                <label>Current Stock</label>
                <input type="number" id="in_stock" name="in_stock" class="form-control" readonly>
            </div>
            <div class="mb-3">
                <label>Sale Price</label>
                <input type="number" name="sale_price" step="0.01" class="form-control" required>
            </div>
            <div class="mb-3">
                <label>Quantity</label>
                <input type="number" name="quantity" class="form-control" required>
            </div>
            <button type="submit" class="btn btn-success">Record Sale</button>
        </form>
    </div>
</div>

    <script>
        function fetchProduct() {
            const code = document.getElementById("item_code").value.trim();
            fetch(`/get-product/${code}`)
                .then(response => response.json())
                .then(data => {
                    if (data.error) {
                        alert(data.error);
                    } else {
                        document.getElementById("item_name").value = data.item_name;
                        document.getElementById("buying_price").value = data.buying_price;
                        document.getElementById("in_stock").value = data.in_stock;
                    }
                });
        }
    </script>
</body>
</html>
