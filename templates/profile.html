<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>My Profile | Fieldmax</title>
    <link rel="icon" href="static/images/fieldmax_logo/fieldmax_icon.png" type="image/x-icon">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    body {
      background-color: #121212;
      color: #e0e0e0;
      font-family: 'Segoe UI', sans-serif;
      padding: 20px;
    }

    .profile-container {
      max-width: 700px;
      margin: 0 auto;
      background-color: #1f1f1f;
      padding: 2rem;
      border-radius: 15px;
      box-shadow: 0 4px 25px rgba(0,0,0,0.6);
    }

    .profile-header {
      display: flex;
      align-items: center;
      gap: 15px;
      margin-bottom: 2rem;
      flex-wrap: wrap;
    }

    .initials-circle {
      width: 60px;
      height: 60px;
      background-color: #42a5f5;
      color: white;
      font-weight: bold;
      font-size: 22px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .greeting-name {
      font-size: 1.6rem;
      font-weight: 600;
      color: #90caf9;
    }

    label {
      margin-top: 1rem;
      color: #90caf9;
      font-weight: 500;
    }

    .form-control {
      background-color: #2a2a2a;
      border: 1px solid #444;
      color: #ffffff;
    }

    .form-control:focus {
      background-color: #2a2a2a;
      color: #ffffff;
      border-color: #42a5f5;
      box-shadow: none;
    }

    input::placeholder {
      color: #aaa;
    }

    hr {
      border-color: #444;
    }

    .btn-primary {
      background-color: #1976d2;
      border: none;
    }

    .btn-secondary {
      background-color: #424242;
      border: none;
    }

    .btn-secondary:hover {
      background-color: #616161;
    }

    @media (max-width: 576px) {
      .profile-header {
        justify-content: center;
        text-align: center;
      }

      .greeting-name {
        font-size: 1.4rem;
      }
    }
  </style>
</head>
<body>

<div class="profile-container">
  <div class="profile-header">
    <div class="initials-circle">
      {{ user[0][0] }}{{ user[1][0] }}
    </div>
    <div class="greeting-name">Hello, {{ user[0] }}!</div>
  </div>

  <form method="POST">
    <div class="form-group">
      <label>First Name</label>
      <input type="text" name="first_name" class="form-control" value="{{ user[0] }}" required>
    </div>

    <div class="form-group">
      <label>Last Name</label>
      <input type="text" name="last_name" class="form-control" value="{{ user[1] }}" required>
    </div>

    <div class="form-group">
      <label>Email (read-only)</label>
      <input type="email" class="form-control" value="{{ user[3] }}" readonly>
    </div>

    <div class="form-group">
      <label>Phone</label>
      <input type="text" name="phone" class="form-control" value="{{ user[2] }}">
    </div>

    <hr class="my-4">
    <h5 class="text-info">Change Password</h5>

        <!-- Current Password -->
    <div class="mb-3 position-relative">
        <label>Current Password</label>
        <input type="password" id="current_password" name="current_password" class="form-control">
        <i class="fas fa-eye toggle-password" onclick="togglePassword('current_password', this)" style="position:absolute; top: 35px; right: 10px; cursor: pointer;"></i>
    </div>

        <!-- New Password -->
    <div class="mb-3 position-relative">
        <label>New Password</label>
        <input type="password" id="new_password" name="new_password" class="form-control">
        <i class="fas fa-eye toggle-password" onclick="togglePassword('new_password', this)" style="position:absolute; top: 35px; right: 10px; cursor: pointer;"></i>
    </div>

        <!-- Confirm New Password -->
    <div class="mb-3 position-relative">
        <label>Confirm New Password</label>
        <input type="password" id="confirm_password" name="confirm_password" class="form-control">
        <i class="fas fa-eye toggle-password" onclick="togglePassword('confirm_password', this)" style="position:absolute; top: 35px; right: 10px; cursor: pointer;"></i>
    </div>


    <button type="submit" class="btn btn-primary mt-4 w-100">Update Profile</button>
  </form>

  <div class="text-center mt-4">
    <a href="{{ url_for('dashboard') }}" class="btn btn-secondary">← Back to Dashboard</a>
  </div>
</div>

<script>
  function togglePassword(fieldId, icon) {
    const field = document.getElementById(fieldId);
    if (field.type === "password") {
      field.type = "text";
      icon.classList.remove("fa-eye");
      icon.classList.add("fa-eye-slash");
    } else {
      field.type = "password";
      icon.classList.remove("fa-eye-slash");
      icon.classList.add("fa-eye");
    }
  }
</script>
<footer class="text-center mt-4 py-3" style="background-color: #1f1f1f; color: #aaa;">
  © {{ datetime.utcnow().year }} Fieldmax Shop. All rights reserved.
</footer>
</body>
</html>
