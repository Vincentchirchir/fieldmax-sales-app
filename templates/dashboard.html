<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Fieldmax Dashboard</title>
    <link rel="icon" href="static/images/fieldmax_logo/fieldmax_icon.png" type="image/x-icon">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: hwb(160 0% 8%);
        }
        .sidebar {
            height: 100vh;
            background-color: lab(100% 0.01 -0.01);
            padding-top: 1rem;
        }
        .sidebar a {
            color: rgb(1, 238, 255);
            padding: 0.75rem;
            display: block;
            text-decoration: none;
        }
        .sidebar a:hover,
        .sidebar a.active {
            background-color: hsl(0, 100%, 50%);
        }
        .content {
            padding: 2rem;
        }
        .card {
            margin-bottom: 1rem;
        }
    </style>
</head>
<body>
<div class="container-fluid">
    <div class="row">
        <!-- Sidebar -->
        <div class="col-md-2 sidebar">
            <h5 class="text-white text-center mb-4">
            <img src="{{ url_for('static', filename='images/fieldmax_logo/fieldmax_icon.png') }}" alt="Fieldmax Logo" style="height: 40px;"> FIELDMAX
            </h5>
            <a href="#" class="active" onclick="showSection('dashboard')">Dashboard</a>
            <a href="#" onclick="showSection('upload')">Upload Product</a>
            <a href="#" onclick="showSection('sale')">Record Sale</a>


            
            <a href="#" onclick="showSection('settings')">Settings</a>
        </div>

        <!-- Main Content -->
        <div class="col-md-10 content">
            <h3 class="mb-4"><h2>{{ greeting }},👋</h2>
            </h3>

            <!-- Dashboard Section -->
            <div id="dashboard">
                <div class="row">
                    <div class="col-md-4">
                        <div class="card text-center">
                            <div class="card-body">
                                <h5>Total Products</h5>
                                <h3>{{ total_products }}</h3>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-4">
                        <div class="card text-center">
                            <div class="card-body">
                                <h5>Total Sales</h5>
                                <h3>{{ total_sales }}</h3>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-4">
                        <div class="card text-center">
                            <div class="card-body">
                                <h5>Total Profit</h5>
                                <h3>Ksh {{ total_profit }}</h3>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Upload Product Section -->
            <div id="upload" style="display: none">
                <div class="card p-4">
                    <h5>Upload Product</h5>
                    <form method="POST" action="/upload-product">
    <div class="mb-3">
        <label>Item Code</label>
        <input type="text" name="code" class="form-control" required>
    </div>
    <div class="mb-3">
        <label>Item Name</label>
        <input type="text" name="name" class="form-control" required>
    </div>
    <div class="mb-3">
        <label>Buying Price</label>
        <input type="number" name="buying" step="0.01" class="form-control" required>
    </div>
    <div class="mb-3">
        <label>Selling Price</label>
        <input type="number" name="selling" step="0.01" class="form-control" required>
    </div>
    <div class="mb-3">
        <label>Quantity to Add</label>
        <input type="number" name="added_stock" class="form-control" required>
    </div>
    <button type="submit" class="btn btn-primary">Upload</button>
</form>
                </div>
            </div>

            <!-- Record Sale Section -->
            <div id="sale" style="display: none">
                <div class="card p-4">
                    <h5>Record Sale</h5>
                    <form method="POST" action="/record-sale">
                        <div class="mb-3">
                            <label>Item Code</label>
                            <input type="text" name="item_code" id="item_code" class="form-control" onblur="fetchProduct()" required>
                        </div> 
                        <div class="mb-3">
                            <label>Item Name</label>
                            <input type="text" id="item_name" name="item_name" class="form-control" readonly>
                        </div>
                        <!--
                        <div class="mb-3">
                            <label>Buying Price</label>
                            <input type="hidden" id="buying_price" name="buying_price" class="form-control" readonly>
                        </div>
                        
                        <div class="mb-3">
                            <label>Current Stock</label>
                            <input type="number" id="in_stock" name="in_stock" class="form-control" readonly>
                        </div>
                        -->
                        <div class="mb-3">
                            <label>Sale Price</label>
                            <input type="number" name="sale_price" step="0.01" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label>Quantity</label>
                            <input type="number" name="quantity" class="form-control" required>
                        </div>
                        <button type="submit" class="btn btn-success">Record Sale</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    function showSection(sectionId) {
        document.getElementById('dashboard').style.display = 'none';
        document.getElementById('upload').style.display = 'none';
        document.getElementById('sale').style.display = 'none';
        document.getElementById(sectionId).style.display = 'block';

        const links = document.querySelectorAll('.sidebar a');
        links.forEach(link => link.classList.remove('active'));
        event.target.classList.add('active');
    }

    function fetchProduct() {
        const code = document.getElementById("item_code").value.trim();
        fetch(`/get-product/${code}`)
            .then(response => response.json())
            .then(data => {
                if (data.error) {
                    alert(data.error);
                } else {
                    document.getElementById("item_name").value = data.item_name;
                    document.getElementById("buying_price").value = data.buying_price;
                    document.getElementById("in_stock").value = data.in_stock;
                }
            });
    }
</script>
</body>
</html>
