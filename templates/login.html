<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Login | Fieldmax</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: 'Segoe UI', sans-serif;
      background: #f4f4f4;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .login-box {
      background: white;
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 5px 20px rgba(0, 0, 0, 0.1);
      width: 360px;
    }

    .logo {
      text-align: center;
      font-size: 20px;
      font-weight: bold;
      color: #0366ff;
      margin-bottom: 20px;
    }

    label {
      font-size: 14px;
      display: block;
      margin-bottom: 5px;
      color: #333;
    }

    input[type="text"],
    input[type="password"] {
      width: 100%;
      padding: 10px;
      border: 1px solid #ccc;
      border-radius: 6px;
      margin-bottom: 15px;
      font-size: 14px;
    }

    button {
      width: 100%;
      padding: 10px;
      background: #0366ff;
      border: none;
      color: white;
      font-weight: bold;
      border-radius: 6px;
      cursor: pointer;
      font-size: 16px;
    }

    button:hover {
      background: #024ec9;
    }

    .register-link {
      text-align: center;
      margin-top: 10px;
      font-size: 13px;
    }

    .register-link a {
      color: #0366ff;
      text-decoration: none;
    }

    .alert {
      padding: 10px;
      border-radius: 5px;
      font-size: 14px;
      margin-bottom: 15px;
    }

    .alert-success {
      background-color: #d4edda;
      color: #155724;
    }

    .alert-danger {
      background-color: #f8d7da;
      color: #721c24;
    }

    .alert-warning {
      background-color: #fff3cd;
      color: #856404;
    }

    .btn-close {
      float: right;
      font-weight: bold;
      background: none;
      border: none;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <form class="login-box" action="/login" method="POST">
    <div class="logo">FIELDMAX LOGIN</div>

    <!-- Flash Messages -->
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        {% for category, message in messages %}
          <div class="alert alert-{{ category }}">
            {{ message }}
            <button type="button" class="btn-close" onclick="this.parentElement.style.display='none';">&times;</button>
          </div>
        {% endfor %}
      {% endif %}
    {% endwith %}

    <label for="email">Email</label>
    <input type="text" name="email" placeholder="Enter email" required>

    <label for="password">Password</label>
    <input type="password" name="password" placeholder="Enter password" required>

    <button type="submit">Login</button>

    <div class="register-link">
      Don't have an account? <a href="/register">Register</a>
    </div>
  </form>
</body>
</html>
