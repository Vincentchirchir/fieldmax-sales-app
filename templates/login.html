<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Login | Fieldmax</title>
  <style>
    body {
        background-color: #121212;
        color: #e0e0e0;
        font-family: 'Segoe UI', sans-serif;
    }

    .login-container {
        max-width: 400px;
        margin: 8% auto 3%;
        background-color: #1f1f1f;
        padding: 2rem;
        border-radius: 10px;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
        text-align: center;
    }

    h2 {
        color: #42a5f5;
        margin-bottom: 1.2rem;
    }

    input[type="email"],
    input[type="password"] {
        width: 100%;
        padding: 10px;
        margin: 0.5rem 0 1rem;
        background-color: #2a2a2a;
        border: 1px solid #444;
        border-radius: 5px;
        color: #fff;
    }

    input[type="email"]:focus,
    input[type="password"]:focus {
        border-color: #42a5f5;
        outline: none;
    }

    button {
        background-color: #1e88e5;
        color: #fff;
        padding: 10px 15px;
        width: 100%;
        border: none;
        border-radius: 5px;
        font-weight: bold;
        transition: background-color 0.3s;
    }

    button:hover {
        background-color: #1565c0;
    }

    .register-link {
        margin-top: 1rem;
        font-size: 0.9rem;
    }

    .register-link a {
        color: #90caf9;
        text-decoration: none;
    }

    .register-link a:hover {
        text-decoration: underline;
    }

    footer {
        margin-top: 2rem;
        color: #aaa;
        font-size: 0.85rem;
    }

    .logo-img {
        height: 50px;
        margin-bottom: 1rem;
    }
  </style>
</head>
<body>

<div class="login-container">
  <img src="{{ url_for('static', filename='images/fieldmax_logo/fieldmax_icon.png') }}" alt="Fieldmax Logo" class="logo-img">

  <h2>FIELDMAX LOGIN</h2>

  <form action="/login" method="POST">
    <!-- Flash Messages -->
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        {% for category, message in messages %}
          <div class="alert alert-{{ category }}">
            {{ message }}
            <button type="button" class="btn-close" onclick="this.parentElement.style.display='none';">&times;</button>
          </div>
        {% endfor %}
      {% endif %}
    {% endwith %}

    <label for="email">Email</label>
    <input type="email" name="email" placeholder="Enter email" required>

    <label for="password">Password</label>
    <input type="password" name="password" placeholder="Enter password" required>

    <button type="submit">Login</button>
  </form>

  <div class="register-link">
      Don’t have an account? <a href="{{ url_for('register') }}">Register</a>
  </div>

  <footer>
      © {{ datetime.utcnow().year }} Fieldmax Shop. All rights reserved.
  </footer>
</div>

</body>
</html>
